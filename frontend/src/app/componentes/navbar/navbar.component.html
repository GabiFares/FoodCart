<nav class="bg-gray-900 border-gray-200 dark:bg-gray-900">
  <div
    class="flex flex-wrap justify-between items-center mx-auto max-w-[96%] p-4"
  >
    <a class="flex items-center space-x-3 rtl:space-x-reverse">
      <img src="assets/logo.jpeg" class="h-20" alt="FoodCart Logo" />
      <span
        class="self-center text-2xl font-semibold whitespace-nowrap text-white dark:text-white"
      >
        FoodCart
      </span>
    </a>
    <div class="flex items-center space-x-6 rtl:space-x-reverse">
      <a href="#" class="text-lg hover:text-gray-700 flex items-center">
        <img src="assets/carrito.png" alt="Cart" class="h-7 w-7" />
      </a>
      <!-- Perfil del Usuario -->
      <div
        class="relative"
        (mouseenter)="openDropdown()"
        (mouseleave)="closeDropdown()"
      >
        <div class="flex items-center space-x-3 cursor-pointer">
          <span
            class="text-lg text-white dark:text-blue-500 hover:text-blue-400"
          >
            {{ usuario.nombre }}
          </span>
          <img
            src="assets/user.png"
            alt="User Photo"
            class="h-10 w-10 rounded-full border-2 border-gray-300"
          />
        </div>
        <div
          *ngIf="dropdownOpen"
          class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg z-10"
        >
          <a
            href="#"
            class="block px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-md"
            (click)="viewProfile()"
          >
            Ver Perfil
          </a>
          <a
            href="#"
            class="block px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-md"
            (click)="logout()"
          >
            Cerrar Sesión
          </a>
        </div>
      </div>
    </div>
  </div>
</nav>

<nav class="bg-red-800 dark:bg-gray-700">
  <div class="max-w-[95%] px-4 py-3 mx-auto">
    <div class="flex items-center justify-between">
      <ul class="flex items-center space-x-8 rtl:space-x-reverse">
        <li>
          <a
            href="comidas"
            class="text-white font-bold text-base hover:text-blue-950"
            aria-current="page"
            >Comidas</a
          >
        </li>
        <li>
          <a
            href="bebidas"
            class="text-white font-bold text-base hover:text-blue-950"
            >Bebidas</a
          >
        </li>
        <li>
          <a
            href="aboutUs"
            class="text-white font-bold text-base hover:text-blue-950"
            >About us</a
          >
        </li>
      </ul>
      <app-search (searchTask)="this.onSearchValue($event)"></app-search>
    </div>
  </div>
</nav>
